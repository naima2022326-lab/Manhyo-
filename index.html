<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Google Classroom</title>

<link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
</head>
<body>

<!-- 🔐 LOGIN -->
<div id="login">
  <div class="login-container">
    <h1 class="logo">MANHYO</h1>
    <p class="tagline">Private Reader Hub</p>
    <div class="input-box">
      <input type="password" id="pw" placeholder="Enter Password" />
      <div class="input-glow"></div>
    </div>
  </div>
</div>

<!-- 🌐 APP -->
<div id="app">
  <div class="topbar">
    <div class="brand">MANHYO</div>
    <div class="top-actions">
      <input type="text" id="searchInput" placeholder="Enter URL and press Enter" />
      <button onclick="openProxy()">Go</button>
    </div>
  </div>

  <div class="layout">
    <div class="left">
      <h1>MANHYO</h1>
      <p>Private reader hub with fullscreen browsing.</p>
    </div>

    <div class="right">
      <div class="grid">
        <div class="card" data-url="https://asuracomic.net">
          <h3>AsuraScans</h3>
          <p>Fast updates, clean reader.</p>
        </div>
        <div class="card" data-url="https://ezmanga.org">
          <h3>Ezmanga</h3>
          <p>Simple manga library.</p>
        </div>
        <div class="card" data-url="https://comix.to">
          <h3>Comix</h3>
          <p>Huge catalog.</p>
        </div>
        <div class="card" data-url="https://mathplayground.com">
          <h3>Mathplayground</h3>
          <p>Just for fun.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 📖 READER -->
<div id="overlay">
  <div id="loader">Loading...</div>
  <iframe id="reader"
    allow="fullscreen; autoplay"
    referrerpolicy="no-referrer"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
  </iframe>
</div>

<script src="script.js"></script>
</body>
</html>
